version: '3.8'

services:
  # Message Broker (Kept in Docker for convenience, but can be local too)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - microservices_net

  # Services
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    volumes:
      - ./order-service:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    networks:
      - microservices_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    volumes:
      - ./inventory-service:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - rabbitmq
    networks:
      - microservices_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    volumes:
      - ./notification-service:/app
    ports:
      - "8001:8001"
    depends_on:
      - rabbitmq
    networks:
      - microservices_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  microservices_net:
    driver: bridge
