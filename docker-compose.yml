version: '3.8'

services:
  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - microservices_net

  # Databases
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: order_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - microservices_net

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - microservices_net

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices_net

  # Services
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    volumes:
      - ./order-service:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - mysql-db
      - rabbitmq
    networks:
      - microservices_net

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    volumes:
      - ./inventory-service:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - microservices_net

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    volumes:
      - ./notification-service:/app
    ports:
      - "8001:8001"
    depends_on:
      - postgres-db
      - rabbitmq
    networks:
      - microservices_net

networks:
  microservices_net:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
  postgres_data:
